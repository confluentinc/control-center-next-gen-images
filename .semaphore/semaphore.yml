version: v1.0
name: build-test-release
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1

fail_fast:
  cancel:
    when: "true"

execution_time_limit:
  hours: 1

queue:
  - when: "branch != 'master' and branch !~ '[0-9]+\\.[0-9]+\\.[0-9]+'"
    processing: parallel

global_job_config:
  prologue:
    commands:
      - checkout
      - if [[ $SEMAPHORE_GIT_BRANCH =~ ^7\..* ]]; then sem-version java 8; else sem-version java 17; fi
      - sem-version python 3.12
      - . vault-setup
      - . cache-maven restore
      - export GIT_COMMIT=$(git rev-parse --verify HEAD --short)
      - export BUILD_NUMBER=$(echo $SEMAPHORE_WORKFLOW_ID | cut -f1 -d"-")
      - export BRANCH_TAG=$(echo $SEMAPHORE_GIT_BRANCH | tr / -)
      # For PR Builds using Packaging
      - export PACKAGING_BUCKET="s3://dev-control-center-packages-654654529379-us-west-2/confluent-control-center-next-gen/$BRANCH_TAG/"
      # Check if version is complete, otherwise use the previous version
      - export C3_VERSION=2.3.2 #hardcoded for now
      - export DEFAULT_OS_TYPE="ubi"
      - export PACKAGES_URL="https://s3-us-west-2.amazonaws.com/dev-control-center-packages-654654529379-us-west-2/confluent-control-center-next-gen/$BRANCH_TAG/latest/PACKAGE_TYPE"
      - 'echo "PACKAGES_URL: ${PACKAGES_URL}"'
      - export PACKAGING_BUILD_NUMBER=$LATEST_PACKAGING_BUILD_NUMBER
      - >-
        if [[ $IS_BETA || $IS_HOTFIX || $IS_POST ]]; then
            export PLATFORM_LABEL=$(echo $BRANCH_TAG | awk -F - '{print "~"$2}')
        elif [[ ! $IS_RELEASE ]]; then
            export PLATFORM_LABEL="~SNAPSHOT"
        else
            export PLATFORM_LABEL=""
        fi
      - export PACKAGING_BUILD_ARGS=" -DC3_VERSION=$C3_VERSION  -DCONFLUENT_PLATFORM_LABEL=$PLATFORM_LABEL -DCONFLUENT_DEB_VERSION=$CONFLUENT_DEB_VERSION  -DALLOW_UNSIGNED=$ALLOW_UNSIGNED"
      - >-
        if [[ $IS_RELEASE && $PACKAGING_BUILD_NUMBER ]]; then
          if [[ $IS_RC ]]; then
              export MAVEN_PACKAGES_URL="https://s3.us-west-2.amazonaws.com/staging-confluent-packages-maven-654654529379-us-west-2/v$BRANCH_NAME/maven"
              if [[ $PACKAGES_MAVEN_URL ]]; then
                  export MAVEN_PACKAGES_URL=$PACKAGES_MAVEN_URL
              fi
          fi
          # Overwrite maven global configuration
          gh api repos/confluentinc/depot/contents/python/cp_devtools/templates/template_resources/maven/maven_semaphore_independent_release_packaging_settings.xml | jq -r '.content' | base64 -d > template-settings.xml
          [[ -f ~/.m2/settings.xml ]] && mv ~/.m2/settings.xml ~/.m2/settings.xml.bak; envsubst < template-settings.xml > ~/.m2/settings.xml # Replacing maven settings with packaging specific settings
        else
          echo "This job is not a isHotfixJob or isRcJob (What we know how to handle) - and we don't know how to handle it"
        fi
      - export DOCKER_DEV_REGISTRY="519856050701.dkr.ecr.us-west-2.amazonaws.com/docker/dev/"
      - export DOCKER_PROD_REGISTRY="519856050701.dkr.ecr.us-west-2.amazonaws.com/docker/prod/"
      - export LATEST_TAG=$BRANCH_TAG-latest
      - export DOCKER_REPOS="confluentinc/cp-enterprise-control-center-next-gen confluentinc/cp-enterprise-prometheus confluentinc/cp-enterprise-alertmanager"
      - export COMMUNITY_DOCKER_REPOS=""
      - |
        if [[ $SKIP_COMMUNITY == "True" ]]; then
          # Filter out community repos from DOCKER_REPOS
          DOCKER_REPOS=$(comm -23 <(echo "$DOCKER_REPOS" | tr ' ' '\n' | sort) <(echo "$COMMUNITY_DOCKER_REPOS" | tr ' ' '\n' | sort) | tr '\n' ' ' | xargs)
          export DOCKER_REPOS
          echo "DOCKER_REPOS after skipping community images - $DOCKER_REPOS"

          # Set Maven arguments for skipping community modules
          export MAVEN_EXTRA_ARGS=""

          # Check if current DOCKER_IMAGE is in community repos, skip job execution
          for skip_repo in $COMMUNITY_DOCKER_REPOS; do
            if [ "$skip_repo" = "$DOCKER_IMAGE" ]; then
              echo "Skipping build for $DOCKER_IMAGE as it is in COMMUNITY_DOCKER_REPOS list"
              export SEMAPHORE_JOB_RESULT=passed
              return 130
            fi
          done
        else
          export MAVEN_EXTRA_ARGS=""
        fi
      - export DOCKER_DEV_TAG="dev-$BRANCH_TAG-$BUILD_NUMBER"
      - export AMD_ARCH=.amd64
      - export ARM_ARCH=.arm64
blocks:
  - name: Validation
    dependencies: []
    run:
      when: "branch = 'master'"
    task:
      jobs:
        - name: Validation
          commands:
            - . sem-pint -c
  - name: Build, Test, & Scan AMD
    dependencies: ["Validation"]
    run:
      when: "pull_request =~ '.*'"
    task:
      jobs:
        - name: Build, Test, & Scan ubi9
          commands:
            - export OS_TAG="-ubi9"
            - export DOCKER_DEV_FULL_IMAGES=$DOCKER_DEV_REGISTRY${DOCKER_REPOS// /:$DOCKER_DEV_TAG$OS_TAG $DOCKER_DEV_REGISTRY}:$DOCKER_DEV_TAG$OS_TAG
            - export AMD_DOCKER_DEV_FULL_IMAGES=${DOCKER_DEV_FULL_IMAGES// /$AMD_ARCH }$AMD_ARCH
            - ci-tools ci-update-version
            - export OS_PACKAGES_URL=$(echo "$PACKAGES_URL" | sed "s/PACKAGE_TYPE/rpm/g")
            - export PACKAGING_BUILD_ARGS="$PACKAGING_BUILD_ARGS -DCONFLUENT_PACKAGES_REPO=$OS_PACKAGES_URL"
            - mvn -Dmaven.wagon.http.retryHandler.count=3 --batch-mode -P jenkins,docker clean package dependency:analyze validate -U -Ddocker.registry=$DOCKER_DEV_REGISTRY
              -DBUILD_NUMBER=$BUILD_NUMBER -DGIT_COMMIT=$GIT_COMMIT -Ddocker.tag=$DOCKER_DEV_TAG$OS_TAG$AMD_ARCH -Darch.type=$AMD_ARCH -Ddocker.os_type=ubi9
              $PACKAGING_BUILD_ARGS -Ddependency.check.skip=true $MAVEN_EXTRA_ARGS
            - . cache-maven store
            - >-
              for dev_image in $AMD_DOCKER_DEV_FULL_IMAGES;
              do
                cve-scan $dev_image
              done
            - for image in $AMD_DOCKER_DEV_FULL_IMAGES; do echo "Pushing $image" && docker push $image; done
      epilogue:
        always:
          commands:
            - . publish-test-results
            - artifact push workflow target/test-results
            - artifact push workflow target --destination target-AMD
  - name: Build & Test ARM
    dependencies: ["Validation"]
    run:
      when: "pull_request =~ '.*'"
    task:
      agent:
        machine:
          type: s1-prod-ubuntu24-04-arm64-1
      jobs:
        - name: Build & Test ubi9
          commands:
            - export OS_TAG="-ubi9"
            - export DOCKER_DEV_FULL_IMAGES=$DOCKER_DEV_REGISTRY${DOCKER_REPOS// /:$DOCKER_DEV_TAG$OS_TAG $DOCKER_DEV_REGISTRY}:$DOCKER_DEV_TAG$OS_TAG
            - export ARM_DOCKER_DEV_FULL_IMAGES=${DOCKER_DEV_FULL_IMAGES// /$ARM_ARCH }$ARM_ARCH
            - export OS_PACKAGES_URL=$(echo "$PACKAGES_URL" | sed "s/PACKAGE_TYPE/rpm/g")
            - export PACKAGING_BUILD_ARGS="$PACKAGING_BUILD_ARGS -DCONFLUENT_PACKAGES_REPO=$OS_PACKAGES_URL"
            - ci-tools ci-update-version
            - mvn -Dmaven.wagon.http.retryHandler.count=3 --batch-mode -P jenkins,docker clean package dependency:analyze validate -U -Ddocker.registry=$DOCKER_DEV_REGISTRY
              -DBUILD_NUMBER=$BUILD_NUMBER -DGIT_COMMIT=$GIT_COMMIT -Ddocker.tag=$DOCKER_DEV_TAG$OS_TAG$ARM_ARCH -Darch.type=$ARM_ARCH -Ddocker.os_type=ubi9
              $PACKAGING_BUILD_ARGS -Ddependency.check.skip=true $MAVEN_EXTRA_ARGS
            - . cache-maven store
            - for image in $ARM_DOCKER_DEV_FULL_IMAGES; do echo "Pushing $image" && docker push $image; done
      epilogue:
        always:
          commands:
            - . publish-test-results
            - artifact push workflow target/test-results
            - artifact push workflow target --destination target-ARM
  # Automates the manual verification described in .github/PULL_REQUEST_TEMPLATE.md:
  # boots cp-all-in-one with the PR-built dev images and waits for control-center,
  # prometheus, and alertmanager to respond healthy. Addresses MMA-17737 / INC-6655.
  - name: Verify cp-all-in-one Docker Compose
    dependencies: ["Build, Test, & Scan AMD"]
    run:
      when: "pull_request =~ '.*'"
    task:
      jobs:
        - name: cp-all-in-one docker compose smoke test
          commands:
            # Derive the matching cp-all-in-one branch from depot's c3_versions.json
            # using C3_VERSION (set per branch in the global prologue by the version-bump bot).
            #
            # Resolution order:
            #   1. Exact C3_VERSION lookup (e.g. "2.3.2") -> CP_VERSION (e.g. "8.0.4")
            #      Falls back to .x lookup (e.g. "2.3.x") if exact isn't in json.
            #   2. Prefer "<CP_VERSION>-post" (the released-patch pin) on cp-all-in-one.
            #   3. Else "<CP major.minor>.x" (active-dev branch for that CP line,
            #      used when -post hasn't been cut yet but the line is in dev).
            #   4. Else "master" (last-resort fallback).
            - |
              C3_VERSIONS_JSON=$(gh api repos/confluentinc/depot/contents/python/common_tools/data/prod/c3_versions.json \
                | jq -r '.content' | base64 -d)
              CP_VERSION=$(echo "$C3_VERSIONS_JSON" \
                | jq -r --arg v "$C3_VERSION" '.[$v]["confluent.version"] // empty' \
                | sed -E 's/-cp[0-9]+$//')
              if [ -z "$CP_VERSION" ]; then
                C3_KEY="$(echo "$C3_VERSION" | grep -oE '^[0-9]+\.[0-9]+').x"
                echo "No c3_versions.json entry for exact $C3_VERSION; trying $C3_KEY"
                CP_VERSION=$(echo "$C3_VERSIONS_JSON" \
                  | jq -r --arg v "$C3_KEY" '.[$v]["confluent.version"] // empty' \
                  | sed -E 's/-cp[0-9]+$//')
              fi
              if [ -n "$CP_VERSION" ]; then
                CP_POST_BRANCH="${CP_VERSION}-post"
                CP_X_BRANCH="$(echo "$CP_VERSION" | grep -oE '^[0-9]+\.[0-9]+').x"
                if git ls-remote --exit-code --heads https://github.com/confluentinc/cp-all-in-one.git "$CP_POST_BRANCH" >/dev/null 2>&1; then
                  CP_ALL_IN_ONE_BRANCH="$CP_POST_BRANCH"
                elif git ls-remote --exit-code --heads https://github.com/confluentinc/cp-all-in-one.git "$CP_X_BRANCH" >/dev/null 2>&1; then
                  echo "cp-all-in-one '$CP_POST_BRANCH' not cut yet; using active-dev '$CP_X_BRANCH'"
                  CP_ALL_IN_ONE_BRANCH="$CP_X_BRANCH"
                else
                  echo "Neither '$CP_POST_BRANCH' nor '$CP_X_BRANCH' exists; falling back to master"
                  CP_ALL_IN_ONE_BRANCH=master
                fi
              else
                echo "No c3_versions.json entry for $C3_VERSION; falling back to master"
                CP_ALL_IN_ONE_BRANCH=master
              fi
              export CP_ALL_IN_ONE_BRANCH
              echo "Using cp-all-in-one branch: $CP_ALL_IN_ONE_BRANCH (C3_VERSION=$C3_VERSION, CP_VERSION=$CP_VERSION)"
            - export ARCH_TAG="-ubi9$AMD_ARCH"
            - export DEV_C3_IMAGE="${DOCKER_DEV_REGISTRY}confluentinc/cp-enterprise-control-center-next-gen:${DOCKER_DEV_TAG}${ARCH_TAG}"
            - export DEV_PROM_IMAGE="${DOCKER_DEV_REGISTRY}confluentinc/cp-enterprise-prometheus:${DOCKER_DEV_TAG}${ARCH_TAG}"
            - export DEV_AM_IMAGE="${DOCKER_DEV_REGISTRY}confluentinc/cp-enterprise-alertmanager:${DOCKER_DEV_TAG}${ARCH_TAG}"
            - echo "Using PR-built images - C3:$DEV_C3_IMAGE PROM:$DEV_PROM_IMAGE AM:$DEV_AM_IMAGE"
            - export AIO_DIR=/tmp/cp-all-in-one
            - rm -rf "$AIO_DIR"
            - git clone --depth 1 -b "$CP_ALL_IN_ONE_BRANCH" https://github.com/confluentinc/cp-all-in-one.git "$AIO_DIR"
            - cd "$AIO_DIR/cp-all-in-one"
            - 'sed -i -E "s|image:[[:space:]]*confluentinc/cp-enterprise-control-center-next-gen:[^[:space:]]+|image: ${DEV_C3_IMAGE}|g" docker-compose.yml'
            - 'sed -i -E "s|image:[[:space:]]*confluentinc/cp-enterprise-prometheus:[^[:space:]]+|image: ${DEV_PROM_IMAGE}|g" docker-compose.yml'
            - 'sed -i -E "s|image:[[:space:]]*confluentinc/cp-enterprise-alertmanager:[^[:space:]]+|image: ${DEV_AM_IMAGE}|g" docker-compose.yml'
            - echo "Patched image refs:" && grep -E "^[[:space:]]*image:" docker-compose.yml
            - docker compose pull
            - docker compose up -d
            - |
              echo "Waiting up to 10 minutes for control-center, prometheus, and alertmanager to become healthy..."
              healthy=0
              for i in $(seq 1 60); do
                c3=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9021/ || echo 000)
                prom=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9090/-/ready || echo 000)
                am=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9093/-/ready || echo 000)
                echo "[try $i] control-center=$c3 prometheus=$prom alertmanager=$am"
                if [ "$c3" = "200" ] && [ "$prom" = "200" ] && [ "$am" = "200" ]; then
                  healthy=1
                  break
                fi
                sleep 10
              done
              if [ "$healthy" != "1" ]; then
                echo "Verification failed: services did not all become healthy within 10 minutes."
                exit 1
              fi
              echo "Verification passed: control-center, prometheus, and alertmanager are healthy."
      epilogue:
        always:
          commands:
            - cd /tmp/cp-all-in-one/cp-all-in-one || true
            - echo "=== docker compose ps ===" && docker compose ps || true
            - echo "=== control-center logs ===" && docker compose logs --no-color --tail=300 control-center || true
            - echo "=== prometheus logs ===" && docker compose logs --no-color --tail=100 prometheus || true
            - echo "=== alertmanager logs ===" && docker compose logs --no-color --tail=100 alertmanager || true
            - docker compose down -v || true
after_pipeline:
  task:
    agent:
      machine:
        type: s1-prod-ubuntu24-04-arm64-0
    jobs:
      - name: Metrics
        commands:
          - emit-ci-metrics -p -a test-results
      - name: Publish Test Results
        commands:
          - test-results gen-pipeline-report
      - name: SonarQube
        commands:
          - checkout
          - sem-version java 11
          - artifact pull workflow target-AMD
          - artifact pull workflow target-ARM
          - emit-sonarqube-data --run_only_sonar_scan
